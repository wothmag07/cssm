data:
  jsonl_path: "data/merged_electronics_data.jsonl"

supabase:
  table_name: "chunks"
  query_name: "match_documents"
  hybrid_query_name: "hybrid_search"

embedding_model:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1536

llm_model:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.2

retriever:
  top_k: 3
  hybrid: true
  semantic_weight: 0.7    # 0.7 = 70% vector + 30% keyword

ingestion:
  batch_embed: 100
  batch_insert: 200
  max_tokens: 1300
  min_tokens: 100
  max_reviews_per_product: 5
  min_review_length: 100
  min_helpful_votes: 10

graph:
  max_retries: 2
